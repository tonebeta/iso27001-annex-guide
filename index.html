<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISO 27001:2022 Annex A 檢核表</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; transition: background 0.3s; }
    </style>
  </head>
  <body>
    <script>
      (function(){
        var t=localStorage.getItem('iso27001-theme')||'system';
        var d=t==='system'?window.matchMedia('(prefers-color-scheme:dark)').matches:t==='dark';
        document.body.style.background=d?'#0a0a0f':'#f5f5f7';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
